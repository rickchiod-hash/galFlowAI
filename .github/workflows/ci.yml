name: GalFlowAI CI

on:
  push:
    branches:
      - master
      - main
      - 'feature/**'
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHON_VERSION: '3.11'

jobs:
  smoke:
    name: smoke-python
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Show environment
        run: |
          python --version
          pip --version
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Branch: $GITHUB_REF_NAME"

      - name: Install minimal dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          elif [ -f pyproject.toml ]; then
            pip install -e .
          else
            echo "No requirements.txt or pyproject.toml found. Skipping dependency install."
          fi

      - name: Python syntax check
        shell: bash
        run: |
          python -m compileall .

      - name: Optional lint
        continue-on-error: true
        shell: bash
        run: |
          python -m pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Optional tests
        continue-on-error: true
        shell: bash
        run: |
          python -m pip install pytest
          if find . -type f \( -name "test_*.py" -o -name "*_test.py" \) | grep -q .; then
            pytest -q
          else
            echo "No pytest tests found. Skipping tests."
          fi

      - name: CI summary
        if: always()
        shell: bash
        run: |
          {
            echo "## GalFlowAI CI"
            echo ""
            echo "- Python: $PYTHON_VERSION"
            echo "- Node 24 actions mode: FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true"
            echo "- Lint: optional / non-blocking"
            echo "- Tests: optional / non-blocking"
            echo "- Hard gate: checkout, Python setup, dependency install, syntax compile"
          } >> "$GITHUB_STEP_SUMMARY"
